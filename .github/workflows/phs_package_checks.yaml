on:
  push:
    branches: [main, master]
  pull_request:
  merge_group:
  workflow_dispatch:

name: phs_checks.yaml

permissions: 
  contents: read
  pull-requests: read
  statuses: read

jobs:
  PHS-package-checks:
    uses: Public-Health-Scotland/actions/.github/workflows/phs_package_checks.yaml@v2.7.0
    with:
      limit_parallel: true
    permissions: 
      contents: write
      pull-requests: write
      statuses: write
    secrets: inherit
